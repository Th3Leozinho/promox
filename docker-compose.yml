version: '3.8'
services:
  backend:
    build: ./backend
    container_name: promox-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    container_name: promox-frontend
    ports:
      - "7001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
