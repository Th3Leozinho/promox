<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="include.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 100px auto 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 24px 24px 24px;
        }
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 32px;
        }
        p {
            color: #4a5568;
            text-align: center;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="container">
        <h1>Dashboard</h1>
        <div style="display:flex;gap:32px;flex-wrap:wrap;justify-content:center;margin-bottom:32px;">
            <div style="background:#edf2fa;padding:18px 32px;border-radius:10px;min-width:220px;text-align:center;box-shadow:0 2px 8px #0001;">
                <b>Dias restantes do token:</b><br><span id="dias-token">...</span>
            </div>
            <div style="background:#edf2fa;padding:18px 32px;border-radius:10px;min-width:220px;text-align:center;box-shadow:0 2px 8px #0001;">
                <b>Última sessão:</b><br><span id="ultima-sessao">...</span>
            </div>
            <div style="background:#edf2fa;padding:18px 32px;border-radius:10px;min-width:220px;text-align:center;box-shadow:0 2px 8px #0001;">
                <b>Horas totais:</b><br><span id="horas-totais">...</span>
            </div>
            <div style="background:#edf2fa;padding:18px 32px;border-radius:10px;min-width:220px;text-align:center;box-shadow:0 2px 8px #0001;">
                <b>Assinatura atual:</b><br><span id="assinatura-atual">...</span>
            </div>
        </div>
        <h2>Minhas Máquinas Alugadas</h2>
        <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;background:#f9fafb;">
                <thead>
                    <tr style="background:#e2e8f0;">
                        <th style="padding:8px 4px;border:1px solid #e2e8f0;">VMID</th>
                        <th style="padding:8px 4px;border:1px solid #e2e8f0;">IP</th>
                        <th style="padding:8px 4px;border:1px solid #e2e8f0;">Porta</th>
                        <th style="padding:8px 4px;border:1px solid #e2e8f0;">Login</th>
                        <th style="padding:8px 4px;border:1px solid #e2e8f0;">Senha</th>
                    </tr>
                </thead>
                <tbody id="tabela-credenciais">
                    <tr><td colspan="5" style="text-align:center;padding:16px;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        // Função para buscar e preencher as credenciais
        async function carregarCredenciais() {
            // Não precisa de username para buscar todas as credenciais
            try {
                const backendUrl = `${window.location.protocol}//${window.location.hostname}:8000`;
                const res = await fetch(`${backendUrl}/credenciais`);
                const creds = await res.json();
                if (!creds.length) {
                    document.getElementById('tabela-credenciais').innerHTML = '<tr><td colspan="4">Nenhuma credencial encontrada.</td></tr>';
                    return;
                }
                document.getElementById('tabela-credenciais').innerHTML = creds.map(c => `
                    <tr>
                        <td style='text-align:center;border:1px solid #e2e8f0;'>${c.vmid || c.id || '-'}</td>
                        <td style='text-align:center;border:1px solid #e2e8f0;'>${c.ip || '-'}</td>
                        <td style='text-align:center;border:1px solid #e2e8f0;'>${c.porta || '-'}</td>
                        <td style='text-align:center;border:1px solid #e2e8f0;'>${c.login}</td>
                        <td style='text-align:center;border:1px solid #e2e8f0;'>${c.senha}</td>
                    </tr>
                `).join('');
                    // Atualiza o card de dias restantes do token com o valor da primeira credencial
                    if (creds[0] && typeof creds[0].dias !== 'undefined') {
                        document.getElementById('dias-token').textContent = creds[0].dias;
                    } else {
                        document.getElementById('dias-token').textContent = '-';
                    }
            } catch (err) {
                document.getElementById('tabela-credenciais').innerHTML = '<tr><td colspan="4">Erro ao carregar credenciais.</td></tr>';
            }
        }
        carregarCredenciais();
        // Os cards de sessão, horas e assinatura podem ser preenchidos aqui se houver API futuramente
        document.getElementById('ultima-sessao').textContent = '-';
        document.getElementById('horas-totais').textContent = '-';
        document.getElementById('assinatura-atual').textContent = '-';
    </script>
</body>
</html>
