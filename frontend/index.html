<script>
    // Detecta o endereço do backend dinamicamente
    const backendUrl = `${window.location.protocol}//${window.location.hostname}:8000`;
</script>
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Painel Proxmox - Mini AWS</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f6fa;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 32px 24px 24px 24px;
        }

        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 32px;
        }

        h2 {
            color: #4a5568;
            margin-top: 24px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 24px;
            align-items: end;
            margin-bottom: 16px;
        }

        form input {
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            font-size: 1em;
            background: #f8fafc;
            width: 100%;
        }

        form button {
            background: #3182ce;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            grid-column: 2 span;
        }

        form button:hover {
            background: #225ea8;
        }

        .vm {
            border: 1px solid #e2e8f0;
            background: #f9fafb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .vm b {
            color: #2b6cb0;
            font-size: 1.1em;
        }

        .vm-status {
            font-size: 0.98em;
            color: #718096;
        }

        .vm-actions {
            margin-top: 6px;
        }

        .vm-actions button {
            margin-right: 8px;
            background: #4299e1;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 6px 14px;
            font-size: 0.97em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .vm-actions button:hover {
            background: #2b6cb0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px 2vw;
            }

            form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Menu topo -->
    <div class="topbar"
        style="width:100%;background:#2d3748;padding:0 0 0 0;margin:0 0 32px 0;box-shadow:0 2px 8px rgba(0,0,0,0.04);display:flex;align-items:center;justify-content:space-between;min-height:56px;position:fixed;top:0;left:0;z-index:10;">
        <div style="color:#fff;font-size:1.25em;font-weight:bold;padding-left:32px;">Painel Proxmox</div>
        <div style="display:flex;align-items:center;gap:18px;padding-right:32px;">
            <span id="welcome-user" style="color:#fff;font-size:1em;"></span>
            <button id="logout-btn"
                style="background:#e53e3e;color:#fff;border:none;border-radius:5px;padding:7px 18px;font-weight:bold;cursor:pointer;">Logout</button>
        </div>
    </div>
    <!-- Menu lateral -->
    <div class="sidebar"
        style="position:fixed;top:56px;left:0;width:220px;height:calc(100vh - 56px);background:#f7fafc;border-right:1px solid #e2e8f0;padding-top:32px;z-index:5;display:flex;flex-direction:column;gap:18px;">
        <a href="#" style="color:#2d3748;text-decoration:none;font-weight:bold;padding:10px 24px;">Dashboard</a>
        <a href="#" style="color:#2d3748;text-decoration:none;font-weight:bold;padding:10px 24px;">Minhas VMs</a>
        <a href="#" style="color:#2d3748;text-decoration:none;font-weight:bold;padding:10px 24px;">Configurações</a>
    </div>
    <div class="container" style="margin-left:240px;margin-top:72px;">
        <h1>Painel Proxmox - Mini AWS</h1>
        <div>
            <h2>Criar VM</h2>
            <form id="create-vm-form">
                <div style="display: flex; flex-direction: column;">
                    <label for="name">Nome:</label>
                    <input type="text" id="name" required>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <label for="cores">Cores:</label>
                    <input type="number" id="cores" value="1" min="1" required>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <label for="memory">Memória (MB):</label>
                    <input type="number" id="memory" value="1024" min="256" required>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <label for="disk">Disco (GB):</label>
                    <input type="number" id="disk" value="10" min="1" required>
                </div>
                <div style="display: flex; flex-direction: column; grid-column: 1 / span 2;">
                    <label for="iso">ISO:</label>
                    <select id="iso" required>
                        <option value="">Carregando ISOs...</option>
                    </select>
                </div>
                <button type="submit">Criar</button>
            </form>
        </div>
        <hr>
        <h2>Minhas VMs</h2>
        <div id="vms"></div>
    </div>
    <script>
        // Preenche o select de ISOs automaticamente
        async function carregarISOs() {
            const isoSelect = document.getElementById('iso');
            try {
                const res = await fetch(`${backendUrl}/isos`);
                const isos = await res.json();
                isoSelect.innerHTML = '';
                if (isos.length === 0) {
                    isoSelect.innerHTML = '<option value="">Nenhuma ISO encontrada</option>';
                } else {
                    isos.forEach(iso => {
                        const opt = document.createElement('option');
                        opt.value = iso;
                        opt.textContent = iso;
                        isoSelect.appendChild(opt);
                    });
                }
            } catch (err) {
                isoSelect.innerHTML = '<option value="">Erro ao carregar ISOs</option>';
            }
        }
        carregarISOs();
        // Proteção de login
        if (!localStorage.getItem('auth')) {
            window.location.href = 'login.html';
        }
        // Recupera nome do usuário do localStorage
        let username = localStorage.getItem('username');
        if (!username) {
            // Se não estiver no localStorage, pede para o usuário logar novamente
            window.location.href = 'login.html';
        }
        // Só executa se o menu existir
        const welcomeUser = document.getElementById('welcome-user');
        const logoutBtn = document.getElementById('logout-btn');
        if (welcomeUser && logoutBtn) {
            welcomeUser.innerText = `Bem-vindo, ${username}!`;
            logoutBtn.onclick = () => {
                localStorage.removeItem('auth');
                localStorage.removeItem('username');
                window.location.href = 'login.html';
            };
        }
        async function fetchVMs() {
            const container = document.getElementById('vms');
            try {
                const res = await fetch(`${backendUrl}/vms`);
                if (!res.ok) throw new Error('Erro ao buscar VMs');
                const vms = await res.json();
                container.innerHTML = '';
                vms.forEach(vm => {
                    const div = document.createElement('div');
                    div.className = 'vm';
                    div.innerHTML = `
                        <b>${vm.name || 'Sem nome'} (ID: ${vm.vmid})</b>
                        <span class="vm-status">Status: ${vm.status}</span>
                        <div class="vm-actions">
                            <button onclick="startVM(${vm.vmid})">Iniciar</button>
                            <button onclick="stopVM(${vm.vmid})">Parar</button>
                            <button onclick="rebootVM(${vm.vmid})">Reiniciar</button>
                            <button onclick="openConsole(${vm.vmid})">Console</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = '<div style="color:#e53e3e;text-align:center;padding:16px;">Erro ao buscar VMs. Verifique se o backend está rodando.</div>';
            }
        }

        async function startVM(vmid) {
            await fetch(`${backendUrl}/vms/start`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vmid })
            });
            fetchVMs();
        }
        async function stopVM(vmid) {
            await fetch(`${backendUrl}/vms/stop`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vmid })
            });
            fetchVMs();
        }
        async function rebootVM(vmid) {
            await fetch(`${backendUrl}/vms/reboot`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vmid })
            });
            fetchVMs();
        }
        async function openConsole(vmid) {
            const res = await fetch(`${backendUrl}/vms/${vmid}/console`);
            const data = await res.json();
            window.open(data.url, '_blank');
        }
        document.getElementById('create-vm-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const cores = document.getElementById('cores').value;
            const memory = document.getElementById('memory').value;
            const disk = document.getElementById('disk').value;
            const iso = document.getElementById('iso').value;
            await fetch(`${backendUrl}/vms/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, cores, memory, disk, iso })
            });
            fetchVMs();
        };
        fetchVMs();
        setInterval(fetchVMs, 10000);
    </script>
</body>

</html>
