<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Computadores Disponíveis</title>
    <script src="include.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f6fa;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 32px 24px 24px 24px;
        }
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 32px;
        }
        .computador {
            border: 1px solid #e2e8f0;
            background: #f9fafb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .computador b {
            color: #2b6cb0;
            font-size: 1.1em;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px 2vw;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script>
        // Carregar sidebar dinamicamente
        document.addEventListener('DOMContentLoaded', function () {
            fetch('sidebar.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                });
        });
    </script>
    <div class="container" style="margin-left:240px;margin-top:72px;">
        <h1>Computadores Disponíveis</h1>
        <div id="computadores-list"></div>
    </div>
    <script>
        // Busca as VMs do backend e exibe as disponíveis
        const backendUrl = `${window.location.protocol}//${window.location.hostname}:8000`;
        async function carregarComputadoresDisponiveis() {
            const container = document.getElementById('computadores-list');
            container.innerHTML = 'Carregando...';
            try {
                const res = await fetch(`${backendUrl}/vms`);
                const vms = await res.json();
                container.innerHTML = '';
                // Considera "Disponível" as VMs que estão paradas (status == 'stopped')
                vms.filter(vm => vm.status === 'stopped').forEach(vm => {
                    const div = document.createElement('div');
                    div.className = 'computador';
                    div.innerHTML = `
                        <img src="https://img.icons8.com/color/96/000000/laptop.png" alt="Laptop" style="width:64px;margin:0 auto 8px auto;display:block;">
                        <b>${vm.name || 'Livre'}</b>
                        <span>Status: Livre</span>
                        <span>Sistema: Outro</span>
                    `;
                    container.appendChild(div);
                });
                if (container.innerHTML === '') {
                    container.innerHTML = '<div style="color:#718096;text-align:center;padding:16px;">Nenhum computador disponível.</div>';
                }
            } catch (err) {
                container.innerHTML = '<div style="color:#e53e3e;text-align:center;padding:16px;">Erro ao buscar computadores.</div>';
            }
        }
        carregarComputadoresDisponiveis();
    </script>
</body>
</html>
