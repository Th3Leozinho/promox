<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Computadores Disponíveis</title>
    <script src="include.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f6fa;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 32px 24px 24px 24px;
        }
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 32px;
        }
        .computador {
            border: 1px solid #e2e8f0;
            background: #f9fafb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .computador b {
            color: #2b6cb0;
            font-size: 1.1em;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px 2vw;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script>
        // Carregar sidebar dinamicamente
        document.addEventListener('DOMContentLoaded', function () {
            fetch('sidebar.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                });
        });
    </script>
    <div class="container" style="margin-left:240px;margin-top:72px;">
        <h1>Computadores Disponíveis</h1>
        <div id="computadores-list"></div>
    </div>
    <!-- Modal para digitar a chave -->
    <div id="modal-key" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.25);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:32px 24px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.12);min-width:320px;max-width:90vw;display:flex;flex-direction:column;align-items:center;">
            <h2>Digite a chave de acesso</h2>
            <input id="input-key" type="password" placeholder="Chave" style="padding:10px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:1em;margin:16px 0;width:100%;max-width:260px;">
            <div id="modal-key-error" style="color:#e53e3e;font-size:0.97em;min-height:24px;"></div>
            <div style="display:flex;gap:16px;margin-top:8px;">
                <button id="btn-key-confirm" style="background:#3182ce;color:#fff;border:none;border-radius:6px;padding:10px 18px;font-weight:bold;cursor:pointer;">Confirmar</button>
                <button id="btn-key-cancel" style="background:#e2e8f0;color:#2d3748;border:none;border-radius:6px;padding:10px 18px;font-weight:bold;cursor:pointer;">Cancelar</button>
            </div>
        </div>
    </div>
    <script>
        // Busca as VMs do backend e exibe as disponíveis
        const backendUrl = `${window.location.protocol}//${window.location.hostname}:8000`;
        let vmsDisponiveis = [];
        let vmSelecionada = null;
        async function carregarComputadoresDisponiveis() {
            const container = document.getElementById('computadores-list');
            container.innerHTML = 'Carregando...';
            try {
                const res = await fetch(`${backendUrl}/vms`);
                const vms = await res.json();
                vmsDisponiveis = vms; // Mostra todas as VMs
                container.innerHTML = '';
                vmsDisponiveis.forEach(vm => {
                    const div = document.createElement('div');
                    div.className = 'computador';
                    div.style.cursor = 'pointer';
                    div.id = `vm-card-${vm.vmid}`;
                    let statusLabel = (vm.status === 'stopped') ? 'Livre' : 'Indisponível';
                    let statusColor = (vm.status === 'stopped') ? '#38d39f' : '#e53e3e';
                    div.innerHTML = ` 
                        <img src="https://img.icons8.com/color/96/000000/laptop.png" alt="Laptop" style="width:64px;margin:0 auto 8px auto;display:block;">
                        <b>${vm.name || 'Livre'} (ID: ${vm.vmid})</b>
                        <span style="color:${statusColor};font-weight:bold;">Status: ${statusLabel}</span>
                        <span>Sistema: Outro</span>
                    `;
                    if (vm.status === 'stopped') {
                        div.onclick = () => abrirModalKey(vm);
                    } else {
                        div.onclick = null;
                        div.style.opacity = 0.7;
                        div.style.pointerEvents = 'none';
                    }
                    container.appendChild(div);
                });
                if (container.innerHTML === '') {
                    container.innerHTML = '<div style="color:#718096;text-align:center;padding:16px;">Nenhum computador disponível.</div>';
                }
            } catch (err) {
                container.innerHTML = '<div style="color:#e53e3e;text-align:center;padding:16px;">Erro ao buscar computadores.</div>';
            }
        }

        function abrirModalKey(vm) {
            vmSelecionada = vm;
            document.getElementById('input-key').value = '';
            document.getElementById('modal-key-error').innerText = '';
            document.getElementById('modal-key').style.display = 'flex';
        }
        function fecharModalKey() {
            document.getElementById('modal-key').style.display = 'none';
        }
        document.getElementById('btn-key-cancel').onclick = fecharModalKey;
        document.getElementById('btn-key-confirm').onclick = async function() {
            const key = document.getElementById('input-key').value.trim();
            if (!key) {
                document.getElementById('modal-key-error').innerText = 'Digite a chave.';
                return;
            }
            try {
                // Busca as informações completas da máquina alugada
                const res = await fetch(`${backendUrl}/maquina_alugada/${vmSelecionada.vmid}/${key}`);
                if (!res.ok) {
                    document.getElementById('modal-key-error').innerText = 'Chave inválida para este computador.';
                    return;
                }
                const info = await res.json();
                // Torna o computador indisponível (exemplo: inicia a VM)
                await fetch(`${backendUrl}/vms/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vmid: vmSelecionada.vmid })
                });
                fecharModalKey();
                // Mostra as informações da máquina para o usuário
                let msg = `Informações da Máquina Alugada:\n` +
                    `IP: ${info.ip}\n` +
                    `Porta: ${info.porta}\n` +
                    `Login: ${info.login}\n` +
                    `Senha: ${info.senha}\n` +
                    `Dias Restantes: ${info.dias_restantes}`;
                alert(msg);
                // Atualiza status visualmente sem recarregar tudo
                const card = document.getElementById(`vm-card-${vmSelecionada.vmid}`);
                if (card) {
                    card.querySelector('span').innerText = 'Status: Indisponível';
                    card.querySelector('span').style.color = '#e53e3e';
                    card.style.opacity = 0.7;
                    card.style.pointerEvents = 'none';
                }
            } catch (err) {
                document.getElementById('modal-key-error').innerText = 'Erro ao validar chave.';
            }
        };
        carregarComputadoresDisponiveis();
    </script>
</body>
</html>
