<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Painel Proxmox</title>
    <style>
        body {
            background: #f4f6fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #fff;
            padding: 32px 28px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .login-box h2 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 12px;
        }
        .login-box input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1em;
            background: #f8fafc;
        }
        .login-box button {
            background: #3182ce;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-box button:hover {
            background: #225ea8;
        }
        .error {
            color: #e53e3e;
            text-align: center;
            font-size: 0.98em;
        }
    </style>
</head>
<body>
    <form class="login-box" id="login-form">
        <h2>Login Painel Proxmox</h2>
        <input type="text" id="username" placeholder="Usuário" required autofocus>
        <input type="password" id="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
        <div class="error" id="error-msg" style="display:none;"></div>
        <div class="link" style="text-align:center;margin-top:8px;">
            Não tem cadastro? <a href="register.html">Crie agora!</a>
        </div>
    </form>
    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('http://backend:8000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                let data = {};
                try {
                    data = await response.json();
                } catch (e) {
                    // resposta não é JSON
                }
                if (response.ok) {
                    // Login bem-sucedido
                    localStorage.setItem('auth', 'ok');
                    localStorage.setItem('username', username);
                    window.location.href = 'index.html';
                } else {
                    errorMsg.innerText = data.detail || 'Usuário ou senha inválidos';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Erro de conexão com o servidor.';
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
