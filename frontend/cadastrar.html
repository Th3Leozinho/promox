<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Credenciais</title>
    <script src="include.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 120px auto 60px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 24px 24px 24px;
        }
        h2 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 24px;
        }
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 18px;
            align-items: center;
        }
        form label {
            justify-self: end;
            margin-right: 8px;
        }
        form input {
            width: 100%;
        }
        form button {
            grid-column: 1 / span 2;
            margin-top: 10px;
        }
        label {
            font-weight: bold;
            color: #4a5568;
        }
        input {
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1em;
            background: #f8fafc;
        }
        button {
            background: #3182ce;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #225ea8;
        }
        .msg {
            margin-top: 12px;
            color: #3182ce;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cadastrar Credenciais</h2>
        <form id="form-credencial">
            <label for="credencial-vmid">VMID:</label>
            <input type="number" id="credencial-vmid" required>

            <label for="credencial-login">Login da VM:</label>
            <input type="text" id="credencial-login" required>

            <label for="credencial-senha-vm">Senha da VM:</label>
            <input type="password" id="credencial-senha-vm" required>

            <label for="credencial-key">Chave (key):</label>
            <input type="text" id="credencial-key" required>

            <label for="credencial-ip">IP da Máquina:</label>
            <input type="text" id="credencial-ip" required>

            <label for="credencial-porta">Porta da Máquina:</label>
            <input type="number" id="credencial-porta" required>

            <label for="credencial-dias">Dias de aluguel:</label>
            <input type="number" id="credencial-dias" required>

            <button type="submit">Cadastrar</button>
        </form>
        <div class="msg" id="credencial-msg"></div>
    </div>
    <script>
        document.getElementById('form-credencial').onsubmit = async function(e) {
            e.preventDefault();
            const vmid = document.getElementById('credencial-vmid').value;
            const login = document.getElementById('credencial-login').value;
            const senha = document.getElementById('credencial-senha-vm').value;
            const chave = document.getElementById('credencial-key').value;
            const ip = document.getElementById('credencial-ip').value;
            const porta = document.getElementById('credencial-porta').value;
            const dias = document.getElementById('credencial-dias').value;
            const backendUrl = `${window.location.protocol}//${window.location.hostname}:8000`;
            try {
                const res = await fetch(`${backendUrl}/credenciais`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vmid, login, senha, chave, ip, porta, dias })
                });
                if (res.ok) {
                    document.getElementById('credencial-msg').innerText = 'Credencial cadastrada com sucesso!';
                } else {
                    document.getElementById('credencial-msg').innerText = 'Erro ao cadastrar credencial.';
                }
            } catch (err) {
                document.getElementById('credencial-msg').innerText = 'Erro ao cadastrar credencial.';
            }
        };
    </script>
</body>
</html>
